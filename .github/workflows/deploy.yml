name: Deploy to Portfolio

on:
  push:
    branches: [ main ]

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Native Deploy to Production (Single-Connection Pipe)
      run: |
        # Setup SSH Key
        mkdir -p ~/.ssh
        echo "${{ secrets.A2_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Create Bundle (Next.js static export target is 'out')
        tar -zcf deploy.tar.gz -C out .
        
        # Piped Transfer & Extraction with Retry Logic
        for i in {1..3}; do
          echo "Deployment attempt $i..."
          cat deploy.tar.gz | ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=60 -p ${{ secrets.A2_PORT }} ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }} \
            "cd ~/ballalight.design && tar -zxf - && find . -type f -exec chmod 644 {} \; && find . -type d -exec chmod 755 {} \;" && break || \
            (echo "Attempt $i failed, retrying in 10s..." && sleep 10)
        done
